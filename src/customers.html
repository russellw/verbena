<!DOCTYPE html>
<html lang="en">
<head>
  <title>Customers</title>
  <style>
      a:link{
        color:currentColor
      }
      a:visited{
        color:currentColor
      }
      body{
        font-size:20px;
        font-family:Arial,sans-serif;
        display:flex
      }
      table{
        width:100%;
        border-collapse:collapse
      }
      th{
        background-color:#f2f2f2
      }
      th,td{
        border:1px solid #d3d3d3;
        padding:8px;
        text-align:left
      }
  </style>
</head>
<body>
<!-- #include "sidebar.html" -->
<div style="padding:20px">
<table>
  <tbody>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
    </tr>
    @{
		select r(customer, 1, id, name, email, phone);
		while (r) @{
            <tr onclick="go(@r[0])">
              <td>@r[0]</td>
              <td>@r[1]</td>
              <td>@r[2]</td>
              <td>@r[3]</td>
            </tr>
        }
    }
  </tbody>
</table>
</div>
<script>
	function go(i) {
		window.location.href = 'customer?i=' + i;
	}
</script>
