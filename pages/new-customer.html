#include <head.html>
  <title>New customer</title>

#include <sidebar.html>

<form class="edit-form" id="form" style="padding:20px" method="post" action="new-customer-save">
      <label for="name">Name</label>
      <input  id="name" name="name" >

      <label for="email">Email</label>
      <input type="email" id="email" name="email">

      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone">

      <label for="delivery_address">Delivery address</label>
      <textarea rows="4" id="delivery_address" name="delivery_address"></textarea>

      <label for="billing_address">Billing address</label>
      <textarea rows="4" id="billing_address" name="billing_address"></textarea>

      <button type="submit">Save</button>
</form>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const form = document.getElementById("form");
    form.addEventListener("submit", async function (event) {
        try {
          event.preventDefault();
          const data = {}
          for(var element of form.querySelectorAll("input,textarea"))
            if(element.value)
              data[element.name]=element.value
          if(!Object.keys(data).length)return;

          const response = await fetch(window.location.href, {
            method: "POST",
            body:JSON.stringify(data)
          });
          if (!response.ok)
            throw new Error(await response.text());

          //window.location.href = 'customers';
        } catch (e) {
            const error = document.createElement("div");
            error.classList.add("error");
            error.textContent = e;
            document.body.appendChild(error);
            console.error("error ", e);
        }
    });
});
</script>

@POST
s=body(s)+strlen("{\"");
string sql = "INSERT INTO customer(";
vector<char*>vals;
jsonField("name");
jsonField("email");
jsonField("phone");
jsonField("delivery_address");
jsonField("billing_address");
sql.pop_back();
sql+=")VALUES(";
for(int i=0;i<vals.size();++i){
    if(i)sql+=',';
    sql+='$';
    sql+='1'+i;
}
sql+=')';
auto S = prep(sql);
for(int i=0;i<vals.size();++i)
	bind(S, i+1, vals[i]);
finish(S);
