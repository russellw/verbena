#include <head.html>
  <title>New customer</title>

#include <sidebar.html>

<form class="edit-form" id="form" style="padding:20px" method="post" action="new-customer-save">
      <label for="name">Name</label>
      <input  id="name" name="name" >

      <label for="email">Email</label>
      <input type="email" id="email" name="email">

      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone">

      <label for="delivery-address">Delivery address</label>
      <textarea rows="4" id="delivery-address" name="delivery-address"></textarea>

      <label for="billing-address">Billing address</label>
      <textarea rows="4" id="billing-address" name="billing-address"></textarea>

      <button type="submit">Save</button>
</form>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const form = document.getElementById("form");
    form.addEventListener("submit", async function (event) {
        try {
          event.preventDefault();
          const data = {}
          for(var element of form.querySelectorAll("input,textarea"))
            if(element.value)
              data[element.name]=element.value

          const response = await fetch(window.location.href, {
            method: "POST",
            body:JSON.stringify(data)
          });
          if (!response.ok)
            throw new Error(`status ${response.status}`);

          //window.location.href = 'customers';
        } catch (e) {
          console.error("error ", e);
        }
    });
});
</script>

@POST
